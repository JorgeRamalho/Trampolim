services:
  - type: web
    name: super-eletrolar
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run deploy:build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    disk:
      name: super-eletrolar-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://super-eletrolar.onrender.com
