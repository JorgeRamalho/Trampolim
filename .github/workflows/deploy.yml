name: Deploy SuperEletroLar

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            react/package-lock.json

      - name: Build
        run: npm run deploy:build

      - name: Verify build
        run: |
          test -f react/dist/index.html
          test -f index.html
          test -f robots.txt
          test -f sitemap.xml
          node --input-type=module -e "import p from './backend/data/products.json' with { type: 'json' }; if(p.length < 16) throw new Error('Expected 16+ products')"
          node --input-type=module -e "import c from './backend/data/carousel.json' with { type: 'json' }; if(!c.length) throw new Error('No carousel slides')"

      - name: Deploy to Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
